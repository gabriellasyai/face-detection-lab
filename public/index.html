<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Detection Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
    .panel { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 20px; }

    label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 4px; }
    input[type="file"], input[type="text"] {
      width: 100%; padding: 8px 12px; background: #27272a; border: 1px solid #3f3f46;
      border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px;
    }
    select {
      width: 100%; padding: 8px 12px; background: #27272a; border: 1px solid #3f3f46;
      border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px;
    }
    input[type="range"] { width: 100%; margin-bottom: 4px; }
    .range-row { margin-bottom: 12px; }
    .range-row span { font-size: 12px; color: #71717a; float: right; }

    button {
      width: 100%; padding: 10px; background: #7c3aed; border: none; border-radius: 8px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #3f3f46; cursor: not-allowed; }
    button.secondary { background: #27272a; border: 1px solid #3f3f46; }
    button.secondary:hover { background: #3f3f46; }

    .preview-area {
      position: relative; background: #000; border-radius: 8px; overflow: hidden;
      min-height: 400px; display: flex; align-items: center; justify-content: center;
    }
    .preview-area img { max-width: 100%; max-height: 600px; }
    .preview-area canvas { position: absolute; top: 0; left: 0; }

    .status { font-size: 13px; color: #a1a1aa; margin: 8px 0; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }

    .json-output {
      background: #0f0f10; border: 1px solid #27272a; border-radius: 8px; padding: 12px;
      font-family: monospace; font-size: 12px; color: #a1a1aa; max-height: 300px;
      overflow-y: auto; white-space: pre-wrap; margin-top: 12px;
    }

    .timeline {
      height: 60px; background: #18181b; border: 1px solid #27272a; border-radius: 8px;
      margin-top: 12px; position: relative; overflow: hidden;
    }
    .timeline .bar { height: 100%; position: absolute; top: 0; opacity: 0.5; border-radius: 4px; }
    .timeline .scrubber {
      position: absolute; top: 0; width: 2px; height: 100%; background: #7c3aed; z-index: 10;
    }

    .faces-list { margin-top: 12px; }
    .face-item {
      display: flex; align-items: center; gap: 8px; padding: 8px;
      background: #27272a; border-radius: 8px; margin-bottom: 4px;
    }
    .face-item .dot { width: 12px; height: 12px; border-radius: 50%; }
    .face-item .info { font-size: 12px; }

    .divider { border-top: 1px solid #27272a; margin: 16px 0; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔬 Face Detection Lab</h1>

    <div class="grid">
      <!-- Left Panel: Controls -->
      <div>
        <div class="panel">
          <h2>Video</h2>
          <label>Upload video</label>
          <input type="file" id="videoFile" accept="video/*">

          <label>Ou start/end (segundos)</label>
          <div style="display:flex;gap:8px">
            <input type="text" id="startTime" placeholder="0" style="width:50%">
            <input type="text" id="endTime" placeholder="30" style="width:50%">
          </div>

          <button id="btnUpload">Upload</button>
          <div id="uploadStatus" class="status"></div>
        </div>

        <div class="panel" style="margin-top:12px">
          <h2>Modo</h2>
          <select id="mode">
            <option value="auto">Automático (Facial)</option>
            <option value="focus">Foco no Rosto</option>
            <option value="split2">Tela Dividida (Split 2)</option>
          </select>

          <div class="divider"></div>
          <h2>Parâmetros</h2>

          <div class="range-row">
            <label>Sample FPS <span id="sampleFpsVal">2</span></label>
            <input type="range" id="sampleFps" min="0.5" max="10" step="0.5" value="2">
          </div>

          <div class="range-row">
            <label>Zoom Level <span id="zoomVal">1.0</span></label>
            <input type="range" id="zoomLevel" min="0.5" max="3.0" step="0.1" value="1.0">
          </div>

          <div class="range-row">
            <label>Face Padding <span id="paddingVal">0.30</span></label>
            <input type="range" id="focusPadding" min="0.05" max="1.0" step="0.05" value="0.30">
          </div>

          <div class="divider"></div>
          <h2>Suavização (One Euro)</h2>

          <div class="range-row">
            <label>Min Cutoff (jitter) <span id="minCutoffVal">0.05</span></label>
            <input type="range" id="smoothMinCutoff" min="0.001" max="1.0" step="0.001" value="0.05">
          </div>

          <div class="range-row">
            <label>Beta (lag) <span id="betaVal">0.01</span></label>
            <input type="range" id="smoothBeta" min="0.001" max="0.5" step="0.001" value="0.01">
          </div>

          <div class="divider"></div>
          <h2>Speaker Detection</h2>

          <div class="range-row">
            <label>MAR Threshold <span id="marVal">0.35</span></label>
            <input type="range" id="marThreshold" min="0.1" max="0.8" step="0.05" value="0.35">
          </div>

          <div class="divider"></div>
          <button id="btnAnalyze" disabled>Analisar Faces</button>
          <button id="btnReSmooth" class="secondary" disabled>Re-Suavizar</button>
          <div id="analyzeStatus" class="status"></div>
        </div>
      </div>

      <!-- Right Panel: Preview -->
      <div>
        <div class="panel">
          <h2>Preview</h2>
          <div class="preview-area" id="previewArea">
            <canvas id="previewCanvas"></canvas>
            <span style="color:#52525b">Upload um vídeo para começar</span>
          </div>

          <div class="timeline" id="timeline"></div>

          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="btnPrev" class="secondary" style="width:auto;padding:8px 16px">← Prev</button>
            <button id="btnNext" class="secondary" style="width:auto;padding:8px 16px">Next →</button>
            <button id="btnPlay" class="secondary" style="width:auto;padding:8px 16px">▶ Play</button>
            <span id="frameInfo" style="flex:1;text-align:right;font-size:12px;color:#71717a;line-height:36px"></span>
          </div>
        </div>

        <div class="panel" style="margin-top:12px">
          <h2>Faces Detectadas</h2>
          <div id="facesList" class="faces-list">
            <span style="color:#52525b;font-size:13px">Nenhuma face detectada</span>
          </div>
        </div>

        <div class="panel" style="margin-top:12px">
          <h2>Crop Data (JSON)</h2>
          <div id="jsonOutput" class="json-output">Sem dados</div>
          <button id="btnCopyJson" class="secondary" style="margin-top:8px">Copiar JSON</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
